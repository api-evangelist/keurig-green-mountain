aid: keurig-green-mountain
name: Keurig Green Mountain
description: >-
  Keurig Green Mountain was a leader in specialty coffee and coffee makers, producing
  the Keurig single-serve brewing system and partnering with leading coffee brands.
  In 2018 Keurig Green Mountain merged with Dr Pepper Snapple Group to form Keurig
  Dr Pepper, a Fortune 500 beverage company. This repository preserves the historical
  API and developer footprint of Keurig Green Mountain prior to that merger.
